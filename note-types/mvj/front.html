<div class="card-inner">
<div class="front">
    <div class="audio-row">
        {{#Word Audio}}
        <div class="audio-item fi" data-audio="word" style="--d:0">
            {{Word Audio}}
            <span class="audio-label">Word</span>
        </div>
        {{/Word Audio}}
        {{#Sentence Audio}}
        <div class="audio-item fi" data-audio="sentence" style="--d:70">
            {{Sentence Audio}}
            <span class="audio-label">Sentence</span>
        </div>
        {{/Sentence Audio}}
    </div>
    {{#Word}}
    <div id="raw-word" style="display:none">{{Word}}</div>
    {{/Word}}
    {{#Sentence}}
    <div id="raw-sentence" style="display:none">{{Sentence}}</div>
    {{/Sentence}}
    {{#Image}}
    <div id="raw-image" style="display:none">{{Image}}</div>
    {{/Image}}
    <div class="front-content">
        <h1 class="target-word" id="front-word"></h1>
        <p class="sentence" id="front-sentence"></p>
        <div class="image-wrap" id="front-image"></div>
    </div>
</div>

<div id="raw-tags" style="display:none">{{Tags}}</div>
<div id="raw-deck" style="display:none">{{Deck}}</div>

<script>
// Mode system — apply tag/deck-based settings overrides
(function() {
    var tagsEl = document.getElementById('raw-tags');
    var tags = tagsEl ? tagsEl.textContent.trim().split(/\s+/).filter(Boolean) : [];

    var deckEl = document.getElementById('raw-deck');
    var deck = deckEl ? deckEl.textContent.trim() : '';

    var root = document.documentElement;
    var rs = getComputedStyle(root);
    var settings = [
        'tategaki', 'color-scheme', 'debug', 'audio-labels', 'card-transparency', 'toggle-align',
        'word-text', 'word-audio', 'word-audio-buttons', 'word-autoplay', 'word-text-play', 'word-furigana', 'word-pitch-color', 'pitch-graph',
        'sentence-text', 'sentence-audio', 'sentence-audio-buttons', 'sentence-autoplay', 'sentence-text-play', 'sentence-furigana', 'sentence-pitch-color',
        'image',
        'definition-text-mono', 'definition-text-bi', 'definition-audio-buttons', 'definition-autoplay-bi', 'definition-autoplay-mono', 'definition-text-play', 'definition-default', 'definition-furigana', 'definition-pitch-color', 'definition-align',
        'notes-text', 'notes-align',
        'details-word-text', 'details-word-audio', 'details-word-autoplay', 'details-pitch-graph',
        'details-sentence-text', 'details-sentence-audio', 'details-sentence-autoplay',
        'details-image', 'details-definition-text-mono', 'details-definition-text-bi', 'details-definition-audio', 'details-notes-text'
    ];

    // Find last defined mode
    var lastMode = 0;
    for (var i = 1; i <= 20; i++) {
        if (!rs.getPropertyValue('--mode-' + i + '-tag').trim()
            && !rs.getPropertyValue('--mode-' + i + '-deck').trim()) break;
        lastMode = i;
    }

    function applyMode(n) {
        for (var j = 0; j < settings.length; j++) {
            var val = rs.getPropertyValue('--mode-' + n + '-' + settings[j]).trim();
            if (val) root.style.setProperty('--' + settings[j], val);
        }
    }

    // Deck matches: high→low so lower numbers take precedence
    for (var i = lastMode; i >= 1; i--) {
        var modeDeck = rs.getPropertyValue('--mode-' + i + '-deck').trim();
        if (!modeDeck) continue;
        var decks = modeDeck.split(',');
        var matched = false;
        for (var k = 0; k < decks.length; k++) {
            var d = decks[k].trim();
            if (d && (deck === d || deck.indexOf(d + '::') === 0)) { matched = true; break; }
        }
        if (matched) applyMode(i);
    }

    // Tag matches: high→low so lower numbers take precedence; tags beat decks
    for (var i = lastMode; i >= 1; i--) {
        var modeTag = rs.getPropertyValue('--mode-' + i + '-tag').trim();
        if (modeTag && tags.indexOf(modeTag) !== -1) applyMode(i);
    }
})();
</script>

<script>
// Toggle alignment — translate left|center to flex-start|center for flex contexts
(function() {
    var v = getComputedStyle(document.documentElement).getPropertyValue('--toggle-align').trim();
    document.documentElement.style.setProperty('--toggle-align-flex', v === 'left' ? 'flex-start' : 'center');
})();

// Tategaki mode — read CSS variable and add class before any rendering
(function() {
    var v = getComputedStyle(document.documentElement).getPropertyValue('--tategaki');
    if (v && v.trim() === 'on') document.documentElement.classList.add('tategaki');
    else if (v) document.documentElement.classList.remove('tategaki');
})();

// Color scheme — read CSS variable and set data attribute
(function() {
    var v = getComputedStyle(document.documentElement).getPropertyValue('--color-scheme');
    if (v) document.documentElement.setAttribute('data-color-scheme', v.trim() || 'blue');
})();

// Debug mode — read CSS variable and set data attribute
(function() {
    var v = getComputedStyle(document.documentElement).getPropertyValue('--debug');
    if (v) document.documentElement.setAttribute('data-debug', v.trim() || 'off');
})();

// Audio labels — read CSS variable and set data attribute
(function() {
    var v = getComputedStyle(document.documentElement).getPropertyValue('--audio-labels');
    if (v) document.documentElement.setAttribute('data-audio-labels', v.trim() || 'on');
})();

// Text-play — read per-section CSS variables and cache
(function() {
    var rs = getComputedStyle(document.documentElement);
    window.__textPlayEnabled = {
        word: rs.getPropertyValue('--word-text-play').trim() !== 'off',
        sentence: rs.getPropertyValue('--sentence-text-play').trim() !== 'off',
        definition: rs.getPropertyValue('--definition-text-play').trim() !== 'off'
    };
})();

// Autoplay — read per-section CSS variables and cache
(function() {
    var rs = getComputedStyle(document.documentElement);
    function apVal(v) { v = v.trim() || 'front & back'; return v === 'on' ? 'front & back' : v === 'off' ? 'none' : v; }
    function defApVal(v, fallback) {
        v = v.trim() || fallback;
        if (v === 'on when unlocked') return 'on when unlocked, otherwise off';
        if (v === 'on when unlocked or on reveal, otherwise off') return 'on when unlocked or on reveal';
        if (v === 'on when mono is locked') return 'on when mono locked, otherwise off';
        if (v === 'on when mono is locked or on reveal') return 'on when mono locked or on reveal';
        if (v === 'on when mono locked or on reveal, otherwise off') return 'on when mono locked or on reveal';
        return v;
    }
    window.__autoplayEnabled = {
        word: apVal(rs.getPropertyValue('--word-autoplay')),
        sentence: apVal(rs.getPropertyValue('--sentence-autoplay')),
        definitionBi: defApVal(rs.getPropertyValue('--definition-autoplay-bi'), 'on when mono locked or on reveal'),
        definitionMono: defApVal(rs.getPropertyValue('--definition-autoplay-mono'), 'on when unlocked or on reveal')
    };
})();

// Card transparency — read CSS variable and set data attribute
(function() {
    var v = getComputedStyle(document.documentElement).getPropertyValue('--card-transparency');
    if (v) document.documentElement.setAttribute('data-card-transparency', v.trim() || 'on');
})();

// Route Web Audio through media channel (audible even with mute switch)
if (navigator.audioSession) navigator.audioSession.type = 'playback';

// AnkiDroid gate. AnkiDroid's WebView allows <audio> autoplay
// (setMediaPlaybackRequiresUserGesture(false)) but does NOT lift the separate
// AudioContext autoplay policy, so Web Audio needs a user gesture to start and the
// recovery machinery wedges on card transition. Web Audio exists solely for the iOS
// WebKit stall — Android must stay on the native <audio> path (the known-good behavior
// prior to the Feb-2026 Web Audio port). UA check backstops the class in case AnkiDroid
// omits it. Defined before the AudioContext lifecycle below so Android can skip it.
window.__isAndroid = function() {
    return document.documentElement.classList.contains('android')
        || (document.body && document.body.classList.contains('android'))
        || (navigator.userAgentData && navigator.userAgentData.platform === 'Android')
        || /Android/i.test(navigator.userAgent);
};

// Create AudioContext eagerly, but do not resume/recover during card setup.
// iOS WebKit audio lifecycle work is deliberately limited to playback time
// so it cannot overlap AnkiMobile reviewer transitions.
if (!window.__isAndroid()) {
    if (!window.__audioCtx) {
        window.__audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}
window.__webAudioGen = window.__webAudioGen || 0;

// iOS WebKit gate: capability + touch + explicit not-Android. The
// AudioContext recovery path below targets a WebKit-specific stall
// (bug #263627) and must not run on other engines.
window.__isIosWebKit = function() {
    return !!navigator.audioSession
        && window.matchMedia('(hover: none)').matches
        && !document.documentElement.classList.contains('android');
};

// Pure read: samples currentTime, waits, resolves whether the clock
// advanced. Required because WebKit can report state==='running' on
// a stalled context (AVAudioSession contention from a prior native
// [sound:]). Instance-stable: a probe started against ctx-A must not
// report healthy if recovery has swapped in ctx-B mid-wait.
window.__audioCtxProbe = function(ms) {
    return new Promise(function(resolve) {
        var ctx = window.__audioCtx;
        if (!ctx || ctx.state !== 'running') { resolve(false); return; }
        var t0 = ctx.currentTime;
        setTimeout(function() {
            resolve(window.__audioCtx === ctx
                && ctx.state === 'running'
                && ctx.currentTime > t0);
        }, ms || 80);
    });
};

// Release an AudioContext's system resources exactly once. iOS/WebKit caps the
// number of live contexts; close() is the only way to free one. The close is
// cached on the context object so a concurrent recovery on the same context
// reuses the in-flight close instead of calling close() twice — a second close
// rejects InvalidStateError, which must NOT be misread as "released". Resolves
// true when close() settles (resolve or reject both mean the close attempt
// completed); never rejects. No internal timeout: the recovery owns the timeout.
window.__releaseContext = function(c) {
    if (!c) return Promise.resolve(true);
    if (c.__releasePromise) return c.__releasePromise;
    if (!c.close) return (c.__releasePromise = Promise.resolve(true));
    c.__releasePromise = new Promise(function(res) {
        var done = false, fin = function() { if (!done) { done = true; res(true); } };
        try {
            var cp = c.close();
            if (cp && cp.then) cp.then(fin, fin);
            else fin();
        } catch(e) { fin(); }
    });
    return c.__releasePromise;
};

// Playback-time refresh only. Closes the old/sick context before constructing a
// replacement (one context live at a time), and cannot complete side effects for
// a stale card scope.
window.__audioCtxRecover = function(scope, expectedGen) {
    if (scope === undefined) scope = window.__currentCardScope;
    if (!window.__isCardScopeActive(scope)) return Promise.resolve(false);
    if (expectedGen === undefined) expectedGen = window.__webAudioGen;
    if (expectedGen !== window.__webAudioGen) return Promise.resolve(false);
    if (window.__audioCtxRecoverPromise
        && window.__audioCtxRecoverScope === scope
        && window.__audioCtxRecoverGen === expectedGen
        && window.__isCardScopeActive(window.__audioCtxRecoverScope)) {
        return window.__audioCtxRecoverPromise;
    }

    var token = {};
    window.__audioCtxRecoverToken = token;
    window.__audioCtxRecoverScope = scope;
    window.__audioCtxRecoverGen = expectedGen;

    function active() {
        return token === window.__audioCtxRecoverToken
            && window.__isCardScopeActive(scope)
            && expectedGen === window.__webAudioGen;
    }

    var p = new Promise(function(resolve) {
        if (!active()) { resolve(false); return; }
        if (window.__webAudioSource) {
            try { window.__webAudioSource.stop(); } catch(e) {}
            window.__webAudioSource = null;
        }
        var Ctor = window.AudioContext || window.webkitAudioContext;
        if (!Ctor) { resolve(false); return; }

        var old = window.__audioCtx;

        function createReplacement() {
            if (!active()) { resolve(false); return; }
            var ctx;
            try {
                ctx = new Ctor();
            } catch(e) {
                resolve(false);
                return;
            }
            // Assign immediately so the last-constructed context is always
            // reachable as window.__audioCtx; the next recovery's release gate
            // (__releaseContext(old)) then covers it — no untracked orphan. (No
            // active() re-check here: nothing yields between the entry check and
            // this point, so it cannot have changed. The setTimeout guard below
            // is the reachable supersession check.)
            window.__audioCtx = ctx;
            if (ctx.state === 'suspended' && ctx.resume) {
                try {
                    var rp = ctx.resume();
                    if (rp && rp['catch']) rp['catch'](function() {});
                } catch(e) {}
            }
            setTimeout(function() {
                if (!active() || window.__audioCtx !== ctx) { resolve(false); return; }
                window.__audioCtxProbe(80).then(function(ok) {
                    resolve(active() && window.__audioCtx === ctx && !!ok);
                }, function() {
                    resolve(false);
                });
            }, 40);
        }

        // Release the old/sick context before constructing a replacement, so at
        // most one context is ever live. Bounded by a 400ms timeout: if release
        // does not confirm in time, abort (the outer .then marks state 'failed',
        // routing playback to HTMLAudio) rather than pile on a second context.
        // old.__releasePromise stays pending and is reused by the next card's
        // recovery, which self-heals once the close finally settles.
        if (!old) { createReplacement(); return; }
        var decided = false;
        var timer = setTimeout(function() {
            if (decided) return;
            decided = true;
            resolve(false);
        }, 400);
        window.__releaseContext(old).then(function() {
            if (decided) return;
            decided = true;
            clearTimeout(timer);
            createReplacement();
        });
    }).then(function(ok) {
        if (token === window.__audioCtxRecoverToken) {
            if (active()) {
                window.__audioCtxState = ok ? 'healthy' : 'failed';
            }
            window.__audioCtxRecoverPromise = null;
            window.__audioCtxRecoverScope = null;
            window.__audioCtxRecoverToken = null;
            window.__audioCtxRecoverGen = null;
        }
        return !!ok;
    });

    window.__audioCtxRecoverPromise = p;
    return p;
};

if (window.__audioCtxTouchHandler) {
    document.removeEventListener('touchend', window.__audioCtxTouchHandler, true);
    window.__audioCtxTouchHandler = null;
}

// Mark AudioContext health unknown after iOS app background/foreground switch.
// iOS suspends the WebView's audio session when backgrounded; the
// context may be stale even if it still claims to be running.
if (window.__audioCtxVisHandler) {
    document.removeEventListener('visibilitychange', window.__audioCtxVisHandler);
    window.__audioCtxVisHandler = null;
}
if (!window.__isAndroid()) {
    window.__audioCtxVisHandler = function() {
        if (document.visibilityState === 'visible' && window.__audioCtx) {
            window.__audioCtxState = 'unknown';
        }
    };
    document.addEventListener('visibilitychange', window.__audioCtxVisHandler);
}

(function() {
    if (!window.matchMedia('(hover: none)').matches) return;
    var ci = document.querySelector('.card-inner');
    if (!ci) return;
    var isBack = !!document.querySelector('.back');
    var fr = !isBack && document.querySelector('.front');
    var isTablet = window.innerWidth >= 768;
    var biVal = getComputedStyle(document.documentElement).getPropertyValue('--bottom-inset');
    var isTategaki = document.documentElement.classList.contains('tategaki');
    function lock() {
        var h = window.innerHeight;
        var rawBi = parseInt(biVal) || 0;
        var bi = Math.max(rawBi - 35, 0);
        if (isTategaki) {
            if (isBack) {
                document.body.style.height = (h - bi) + 'px';
                var tateInset = Math.max(40, rawBi + (isTablet ? 20 : 7));
                ci.style.height = Math.min(h - tateInset, isTablet ? 668 : Infinity) + 'px';
            }
        } else {
            if (isBack) {
                if (isTablet) {
                    document.body.style.height = (h - bi) + 'px';
                    ci.style.minHeight = '650px';
                } else {
                    document.body.style.height = (h - bi) + 'px';
                    ci.style.minHeight = (h - 40 - bi + 1) + 'px';
                }
            }
        }
    }
    if (window.innerHeight > 100) {
        lock();
    } else {
        (function wait() {
            requestAnimationFrame(function() {
                if (window.innerHeight > 100) { lock(); }
                else wait();
            });
        })();
    }
})();

// Clean up previous card
window.__activateCardScope = function(root) {
    if (window.__cardScopeObserver) {
        window.__cardScopeObserver.disconnect();
        window.__cardScopeObserver = null;
    }
    var scope = { root: root, stale: !root };
    window.__currentCardScope = scope;
    if (!root || !document.body) return scope;
    var obs = new MutationObserver(function() {
        if (window.__currentCardScope !== scope) {
            obs.disconnect();
            return;
        }
        if (scope.root && scope.root.isConnected) return;
        scope.stale = true;
        obs.disconnect();
        if (window.__cardScopeObserver === obs) window.__cardScopeObserver = null;
        if (window.__stopAllAudio) window.__stopAllAudio();
    });
    obs.observe(document.body, { childList: true, subtree: true });
    window.__cardScopeObserver = obs;
    return scope;
};

window.__isCardScopeActive = function(scope) {
    return !!scope && !scope.stale && !!scope.root
        && scope.root.isConnected && window.__currentCardScope === scope;
};

window.__activateCardScope(document.querySelector('.card-inner'));
if (window.__stopAllAudio) window.__stopAllAudio();
document.querySelectorAll('body > audio').forEach(function(a) {
    a.pause();
    a.removeAttribute('src');
    a.load();
    a.remove();
});
if (window.__observers) {
    for (var i = 0; i < window.__observers.length; i++) window.__observers[i].disconnect();
}
window.__observers = [];

// Each card may follow a foreign [sound:] card that took the AVAudioSession.
// Mark unknown, but defer probing/replacement until playback so audio work
// cannot overlap AnkiMobile's reviewer transition.
if (!window.__isAndroid()) {
    window.__audioCtxState = 'unknown';
}

// Shared audio utilities (available on back via {{FrontSide}})
window.__audioSVG = '<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="29" fill="none" stroke="black" stroke-width="1"/><path d="M56.6,32l-36.5,21.1V10.9L56.6,32z"/></svg>';

window.__animateBtn = function(btn) {
    var isTouch = window.matchMedia('(hover: none)').matches;
    if (isTouch) {
        btn.classList.add('highlight-touch');
        setTimeout(function() { btn.classList.remove('highlight-touch'); }, 350);
        return;
    }
    btn.style.transform = 'scale(0.95)';
    btn.style.transitionDuration = '80ms';
    btn.classList.add('highlight');
    setTimeout(function() { btn.style.transform = 'scale(1.06)'; btn.style.transitionDuration = ''; }, 100);
    setTimeout(function() {
        btn.style.transform = '';
        btn.classList.remove('highlight');
    }, 350);
};

window.__onTap = function(btn, handler, dblHandler) {
    btn._hasHandler = true;
    btn._tapHandler = handler;
    btn._dblHandler = dblHandler || null;
    if (btn._onTapBound) return;
    btn._onTapBound = true;
    var moved;
    var DBL_MS = 350;
    function dispatch(ev) {
        var now = Date.now();
        if (btn._dblHandler && btn._lastDispatch && now - btn._lastDispatch < DBL_MS) {
            btn._lastDispatch = 0;
            btn._dblHandler(ev);
        } else {
            btn._lastDispatch = now;
            btn._tapHandler(ev);
        }
    }
    btn.addEventListener('touchstart', function() { moved = false; }, { passive: true });
    btn.addEventListener('touchmove', function() { moved = true; }, { passive: true });
    btn.addEventListener('touchend', function(ev) {
        if (moved) return;
        ev.preventDefault();
        btn._lastTapTime = Date.now();
        dispatch(ev);
    });
    btn.addEventListener('click', function(ev) {
        ev.preventDefault();
        if (btn._lastTapTime && Date.now() - btn._lastTapTime < 400) return;
        dispatch(ev);
    });
};

window.__clickSoundLink = function(html) {
    var tmp = document.createElement('div');
    tmp.innerHTML = html;
    var link = tmp.firstElementChild;
    if (link) {
        link.style.position = 'fixed';
        link.style.opacity = '0';
        link.style.pointerEvents = 'none';
        document.body.appendChild(link);
        link.click();
        setTimeout(function() { if (link.parentNode) link.remove(); }, 200);
    }
};

window.__extractAudio = function(container) {
    var filenames = [];
    var usePycmd = false;
    var text = container.textContent;
    var re = /\[audio:([^\]]+)\]/g;
    var m;
    while ((m = re.exec(text)) !== null) filenames.push(m[1].replace(/#/g, '%23').replace(/\?/g, '%3F'));
    if (!filenames.length) {
        container.querySelectorAll('.soundLink').forEach(function(link) {
            filenames.push(link.outerHTML);
        });
        if (filenames.length) usePycmd = true;
    }
    if (!filenames.length) {
        container.querySelectorAll('audio').forEach(function(a) {
            var src = a.getAttribute('src') || (a.querySelector('source') || {}).getAttribute && (a.querySelector('source') || {}).getAttribute('src');
            if (src) filenames.push(src);
        });
    }
    return { filenames: filenames, usePycmd: usePycmd };
};

window.__adoptNativeAudio = function(elements) {
    var SVG = window.__audioSVG;
    var buttons = [];
    for (var i = 0; i < elements.length; i++) {
        var el = elements[i];
        if (el.classList && el.classList.contains('replay-button')) {
            buttons.push(el);
        } else if (el.tagName === 'AUDIO') {
            el.style.display = 'none';
            el.removeAttribute('controls');
            document.body.appendChild(el);
            var btn = document.createElement('a');
            btn.className = 'replay-button soundLink';
            btn.href = '#';
            btn.innerHTML = SVG;
            if (window.__defAudioEls) window.__defAudioEls.push(el);
            (function(audio, b) {
                window.__onTap(b, function() {
                    if (window.matchMedia('(hover: none)').matches) {
                        window.__stopAllAudio();
                        window.__animateBtn(b);
                        window.__playMobile(audio.src, b);
                    } else {
                        window.__stopAllAudio(audio);
                        audio.currentTime = 0;
                        window.__safePlay(audio);
                        window.__animateBtn(b);
                        window.__startPlaying(audio, b);
                    }
                }, function() { window.__stopAllAudio(); });
            })(el, btn);
            btn._audioSrc = el.src;
            buttons.push(btn);
        }
    }
    return buttons;
};

window.__stopAllAudio = function(except) {
    window.__webAudioGen = (window.__webAudioGen || 0) + 1;
    if (window.__webAudioSource) {
        try { window.__webAudioSource.stop(); } catch(e) {}
        window.__webAudioSource = null;
    }
    window.__autoPlayDefAudio = null;
    document.querySelectorAll('.replay-button.playing').forEach(function(b) {
        b.classList.remove('playing');
    });
    document.querySelectorAll('.text-play.playing').forEach(function(t) {
        t.classList.remove('playing');
    });
    var els = window.__defAudioEls || [];
    for (var i = 0; i < els.length; i++) {
        if (els[i] !== except) { els[i].pause(); els[i].currentTime = 0; }
        els[i].onended = null;
    }
    document.querySelectorAll('audio').forEach(function(a) {
        if (a !== except) { a.pause(); a.currentTime = 0; }
        a.onended = null;
    });
};

window.__safePlay = function(audio, scope) {
    if (scope === undefined) scope = window.__currentCardScope;
    if (!window.__isCardScopeActive(scope)) return;
    var p = audio.play();
    if (p && p['catch']) p['catch'](function(e) {
        if (e && (e.name === 'NotAllowedError' || e.name === 'AbortError')) return;
        if (audio.readyState < 3) {
            audio.load();
            audio.addEventListener('canplaythrough', function retry() {
                audio.removeEventListener('canplaythrough', retry);
                if (!window.__isCardScopeActive(scope)) return;
                audio.play()['catch'](function() {});
            });
        } else {
            setTimeout(function() {
                if (!window.__isCardScopeActive(scope)) return;
                audio.play()['catch'](function() {});
            }, 50);
        }
    });
};

window.__startPlaying = function(audio, btn) {
    if (!btn) return;
    btn.classList.add('playing');
    btn._currentAudio = audio;

    var audioItem = btn.closest('.audio-item');
    var textKey = null;
    if (audioItem) {
        var audioType = audioItem.getAttribute('data-audio');
        var defLang = audioItem.getAttribute('data-def-lang');
        if (audioType === 'def' && defLang) textKey = 'def-' + defLang;
        else if (audioType) textKey = audioType;
    }
    var linkedTexts = textKey ? document.querySelectorAll('.text-play[data-text-play="' + textKey + '"]') : [];
    // Fallback: if a lang-specific key like "def-bi" found nothing, also check the generic "def" key

function clearLastMargin(el) {
    if (!el) return;
    var items = [];
    (function collect(parent) {
        for (var i = 0; i < parent.children.length; i++) {
            var child = parent.children[i];
            if (getComputedStyle(child).display === 'contents') {
                collect(child);
            } else {

            }

    })(el);
    var isVertical = getComputedStyle(el).writingMode === 'vertical-rl';
    items = items.filter(function(item) {
        if (getComputedStyle(item).display === 'none') return false;
        var r = item.getBoundingClientRect();
        // Skip zero-dimension elements (empty placeholders)
        if (isVertical ? r.width === 0 : r.height === 0) return false;
        return true;
    });
    if (!items.length) return;

    // Use bounding rects to find the item at the physical block-end edge,
    // instead of CSS order — handles wrapping flex and variable-width children.
    //   vertical-rl  → leftmost item  (smallest rect.left)  → clear marginLeft
    //   horizontal-tb → bottommost item (largest rect.bottom) → clear marginBottom
    var blockProp = isVertical ? 'marginLeft' : 'marginBottom';
    var blockEndItem = null;
    var blockEndVal = isVertical ? Infinity : -Infinity;
    for (var i = 0; i < items.length; i++) {
        var rect = items[i].getBoundingClientRect();
        var val = isVertical ? rect.left : rect.bottom;
        if (isVertical ? (val < blockEndVal) : (val > blockEndVal)) {
            blockEndVal = val;
            blockEndItem = items[i];
        }
    }
    if (blockEndItem) {
        blockEndItem.style[blockProp] = '0';
        blockEndItem.classList.add('debug-last');
    }

    // In vertical-rl, also clear inline-end (marginBottom) on the bottommost
    // item — same logic but for the inline axis.
    if (isVertical) {
        var inlineEndItem = null;
        var inlineEndVal = -Infinity;
        for (var i = 0; i < items.length; i++) {
            var rect = items[i].getBoundingClientRect();
            if (rect.bottom > inlineEndVal) {
                inlineEndVal = rect.bottom;
                inlineEndItem = items[i];
            }
        }
        if (inlineEndItem) {
            inlineEndItem.style.marginBottom = '0';
        }
    }
}

    // dispatches over these.
    window.segmentMixed = function(raw) {
        if (!raw) return [];

        function isJpChar(ch) {
            var c = ch.charCodeAt(0);
            return (c >= 0x3040 && c <= 0x309F) ||
                   (c >= 0x30A0 && c <= 0x30FF) ||
                   (c >= 0x4E00 && c <= 0x9FFF) ||
                   (c >= 0x3400 && c <= 0x4DBF) ||
                   (c >= 0x3000 && c <= 0x303F) ||
                   (c >= 0xFF00 && c <= 0xFFEF);
        }
        function lookbackCls(units) {
            for (var p = units.length - 1; p >= 0; p--) {
                if (units[p].cls === 'jp' || units[p].cls === 'other') return units[p].cls;
            }
            return null;
        }
        function isPitchAlt(text) {
            return !!text && /^(?:p?[a-zA-Z]?~?\d?~?|[a-zA-Z]{1,2}:[hlHL]+)$/.test(text);
        }
        function isPitchSuffix(text) {
            if (text === '') return true;
            var parts = text.split(',');
            for (var i = 0; i < parts.length; i++) {
                if (!isPitchAlt(parts[i])) return false;
            }
            return true;
        }
        function pitchSuffixEnd(raw, pos) {
            var end = pos + 1;
            var token = '';
            for (var j = pos + 1; j < raw.length; j++) {
                var ch = raw.charAt(j);
                if (/[\s\t\u3000;|\/／「」、､]/.test(ch)) break;
                token += ch;
                if (isPitchSuffix(token)) end = j + 1;
            }
            return end;
        }

        var units = [];
        var i = 0;
        while (i < raw.length) {
            var ch = raw.charAt(i);
            if (ch === '<') {
                var endTag = raw.indexOf('>', i);
                if (endTag !== -1) {
                    units.push({ cls: 'neutral', text: raw.substring(i, endTag + 1) });
                    i = endTag + 1;
                    continue;
                }
            }
            if (ch === '[') {
                var endBr = raw.indexOf(']', i);
                if (endBr !== -1) {
                    // A [reading] bracket is attached to the preceding word —
                    // inherit its class so it stays in that segment instead of
                    // drifting across a script boundary.
                    units.push({ cls: lookbackCls(units) || 'other', text: raw.substring(i, endBr + 1) });
                    i = endBr + 1;
                    continue;
                }
            }
            if (ch === ':' && lookbackCls(units) === 'jp') {
                var suffixEnd = pitchSuffixEnd(raw, i);
                units.push({ cls: 'jp', text: raw.substring(i, suffixEnd) });
                i = suffixEnd;
                continue;
            }
            var cls;
            if (/\s/.test(ch)) {
                cls = 'neutral';
            } else if (isJpChar(ch)) {
                cls = 'jp';
            } else if (/[A-Za-z]/.test(ch)) {
                if (raw.charAt(i + 1) === '[') {
                    cls = 'jp';
                } else {
                    var prev = units.length ? units[units.length - 1] : null;
                    cls = (prev && prev.cls === 'jp' && (prev.text === ':' || /[A-Za-z]/.test(prev.text)))
                        ? 'jp' : 'other';
                }
            } else if (ch === '*' || ch === '^' || ch === '\\') {
                // Pitch prefix markers (devoiced/high/literal) attach to the
                // kana that FOLLOWS, so look ahead past any further markers.
                var pk = i + 1;
                while (pk < raw.length && (raw.charAt(pk) === '*' || raw.charAt(pk) === '^' || raw.charAt(pk) === '\\')) pk++;
                cls = (pk < raw.length && isJpChar(raw.charAt(pk))) ? 'jp'
                    : (lookbackCls(units) === 'jp') ? 'jp' : 'other';
            } else if (/[0-9]/.test(ch)) {
                if (lookbackCls(units) === 'jp') {
                    cls = 'jp';
                } else {
                    // No JP context behind a digit (e.g. a number at the very
                    // start of a field). Look forward past the digit run: a
                    // following JP char, or a furigana *reading* bracket,
                    // means this number is part of a Japanese word and its
                    // [reading] must render as ruby. The reading test mirrors
                    // textToRuby (forced [!..], split [..|..] either side, or
                    // kana/Latin body) but excludes digit-only pitch [0].
                    var dj = i;
                    while (dj < raw.length && /[0-9]/.test(raw.charAt(dj))) dj++;
                    var rb = false;
                    if (raw.charAt(dj) === '[') {
                        var be = raw.indexOf(']', dj);
                        if (be !== -1) {
                            var b = raw.substring(dj + 1, be);
                            rb = !!b && !/^[0-9]+$/.test(b) && (
                                b.charAt(0) === '!' ? b.length > 1
                              : b.indexOf('|') !== -1 ? b.split('|').join('') !== ''
                              : /[぀-ゟ゠-ヿa-zA-Z]/.test(b));
                        }
                    }
                    cls = ((dj < raw.length && isJpChar(raw.charAt(dj))) || rb) ? 'jp' : 'other';
                }
            } else if (/[:~;|\-.\/]/.test(ch)) {
                cls = (lookbackCls(units) === 'jp') ? 'jp' : 'other';
            } else {
                cls = 'other';
            }
            units.push({ cls: cls, text: ch });
            i++;
        }

        var segs = [];
        var current = null;
        var pending = '';
        for (var k = 0; k < units.length; k++) {
            var u = units[k];
            if (u.cls === 'neutral') {
                pending += u.text;
            } else if (!current) {
                current = { cls: u.cls, text: pending + u.text };
                pending = '';
            } else if (current.cls === u.cls) {
                current.text += pending + u.text;
                pending = '';
            } else {
                segs.push(current);
                if (pending) { segs.push({ cls: 'neutral', text: pending }); pending = ''; }
                current = { cls: u.cls, text: u.text };
            }
        }
        if (current) {
            segs.push(current);
            if (pending) segs.push({ cls: 'neutral', text: pending });
        } else if (pending) {
            segs.push({ cls: 'other', text: pending });
        }
        return segs;
    };

    // ── Everything below is front-only ──
    if (document.querySelector('.back')) return;

    // ── plainRuby: bracket notation → <ruby>, no accent colors ──
    var FRONT_SEPS = [',', '\u3001', '\u300C', '\u300D', '\u3002', '!', '?', '\uFF01', '\uFF1F'];
    function normalizeFrontRuby(raw) {
        raw = raw.replace(/<[^>]+>/g, ' ');
        raw = escapeBrackets(raw);
        raw = raw.replace(/([\u3002!?\uFF01\uFF1F])(?!:)/g, ' $1 ');
        raw = raw.replace(/([\u300C\u300D|、､])/g, ' $1 ');
        raw = raw.replace(/([^ ]), /g, ' $1 , ');
        return raw;
    }

    function plainRuby(raw) {
        if (!raw) return '';
        raw = normalizeFrontRuby(raw);
        var tokens = raw.split(/[\s\t\u3000]+/).filter(Boolean);
        var out = [];
        for (var i = 0; i < tokens.length; i++) {
            var t = tokens[i];
            if (/^[;|\.\/／\-]+$/.test(t)) continue;
            if (FRONT_SEPS.indexOf(t) !== -1) { out.push(t); continue; }
            t = t.replace(/:[a-zA-Z0-9~,\-]*$/, '');
            t = t.replace(/[\*\\\^]/g, '');
            out.push(textToRuby(t));
        }
        return out.join('');
    }

    // ── coloredRuby: bracket notation → <ruby> with accent-color spans ──
    function coloredRuby(raw) {
        if (!raw) return '';
        raw = normalizeFrontRuby(raw);
        var tokens = raw.split(/[\s\t\u3000]+/).filter(Boolean);
        var roleMap = {
            h: 'heiban', a: 'atamadaka', n: 'nakadaka', o: 'odaka', k: 'kifuku',
            b: 'black',
            H: 'keihan_heiban', A: 'keihan_atamadaka', N: 'keihan_nakadaka',
            L: 'keihan_low_heiban', M: 'keihan_low_nakadaka', O: 'keihan_low_odaka'
        };
        function accentClass(accent) {
            if (!accent) return '';
            accent = accent.replace(/-+$/, '');
            if (!accent) return '';
            var km = accent.match(/^([a-zA-Z]{1,2}):([hlHL]+)$/);
            if (km) return roleMap[km[1]] || '';
            var tm = accent.match(/^(p)?([a-zA-Z])?~?(\d)?~?$/);
            if (!tm) return '';
            if (tm[1]) {
                var role = tm[2] && roleMap[tm[2]] ? roleMap[tm[2]]
                         : tm[3] !== undefined ? (parseInt(tm[3]) === 0 ? 'heiban' : parseInt(tm[3]) === 1 ? 'atamadaka' : 'nakadaka')
                         : '';
                return role ? 'particle ' + role : 'particle';
            }
            if (tm[2] && roleMap[tm[2]]) return roleMap[tm[2]];
            if (tm[3] !== undefined) {
                var n = parseInt(tm[3]);
                return n === 0 ? 'heiban' : n === 1 ? 'atamadaka' : 'nakadaka';
            }
            return '';
        }
        var out = [], pending = [];
        for (var i = 0; i < tokens.length; i++) {
            var t = tokens[i];
            if (/^[;|\.\/／\-]+$/.test(t)) continue;
            if (FRONT_SEPS.indexOf(t) !== -1) {
                if (pending.length) { out.push(pending.join('')); pending = []; }
                out.push(t);
                continue;
            }
            var colonIdx = t.indexOf(':');
            var cls = '';
            var wordPart = t;
            if (colonIdx !== -1) {
                wordPart = t.substring(0, colonIdx);
                cls = accentClass(t.substring(colonIdx + 1).split(',')[0]);
            }
            var html = textToRuby(wordPart.replace(/[\*\\\^]/g, ''));
            if (colonIdx === -1) {
                pending.push(html);
            } else {
                var merged = pending.join('') + html;
                pending = [];
                out.push(cls ? '<span class="' + cls + '">' + merged + '</span>' : merged);
            }
        }
        if (pending.length) out.push(pending.join(''));
        return out.join('');
    }

    // Front-side renderer: routes JP segments through coloredRuby/plainRuby,
    // strips inline HTML from non-JP. Segmentation is shared via
    // window.segmentMixed.
    function renderMixed(raw, opts) {
        if (!raw) return '';
        var colored = opts && opts.colored;
        var segs = window.segmentMixed(raw);
        var out = [];
        for (var s = 0; s < segs.length; s++) {
            var seg = segs[s];
            if (seg.cls === 'jp') {
                out.push((colored ? coloredRuby : plainRuby)(seg.text));
            } else if (seg.cls === 'neutral') {
                out.push(seg.text);
            } else {
                out.push(seg.text.replace(/<[^>]+>/g, ' '));
            }
        }
        return out.join('');
    }

    // ── Populate front-content children (front only) ──
    if (wordSide === 'front & back') {
        var rw = document.getElementById('raw-word');
        var html = rw ? renderMixed(rawFieldText(rw), { colored: wordPC === 'front & back' }) : '';
        if (html) {
            frontWord.innerHTML = html;
            if (wordPC === 'front & back') frontWord.classList.add('pitch-color-front');
        } else { frontWord.setAttribute('data-side', 'back'); }
    }

    if (sentSide === 'front & back') {
        var rs = document.getElementById('raw-sentence');
        var html = rs ? rawFieldLines(rs).map(function(line) {
            return renderMixed(line, { colored: sentPC === 'front & back' });
        }).filter(Boolean).join('<br>') : '';
        if (html) {
            frontSent.innerHTML = html;
            if (sentPC === 'front & back') frontSent.classList.add('pitch-color-front');
        } else { frontSent.setAttribute('data-side', 'back'); }
    }

    if (imageSide === 'front & back') {
        var ri = document.getElementById('raw-image');
        if (ri && ri.innerHTML.trim()) { frontImage.innerHTML = ri.innerHTML; }
        else { frontImage.setAttribute('data-side', 'back'); }
    }
    if (window.__checkImageFit) window.__checkImageFit();

    if (wordFurigana === 'front & back') frontWord.classList.add('furigana-front');
    else if (wordFurigana === 'off') frontWord.classList.add('furigana-off');
    else if (!_isBack && document.documentElement.classList.contains('tategaki')) frontWord.classList.add('furigana-hidden');
    if (sentFurigana === 'front & back') frontSent.classList.add('furigana-front');
    else if (sentFurigana === 'off') frontSent.classList.add('furigana-off');
    else if (!_isBack && document.documentElement.classList.contains('tategaki')) frontSent.classList.add('furigana-hidden');

    // ── Front-side text-play linkage ──
    if (wordSide === 'front & back'
        && document.querySelector('.audio-row .audio-item[data-audio="word"]')
        && frontWord.innerHTML) {
        if (wordAudioSide === 'front & back') {
            window.__linkTextPlay(frontWord, 'word', {
                play: function() {
                    var item = document.querySelector('.audio-item[data-audio="word"][data-side="front"]');
                    window.__playItemAudios(item);
                },
                getBtn: function() {
                    return document.querySelector('.audio-item[data-audio="word"] .replay-button');
                },
                getAllBtns: function() {
                    return Array.from(document.querySelectorAll('.audio-item[data-audio="word"] .replay-button'));
                }
            });
        } else if (wordAudioSide !== 'off') {
            frontWord.classList.add('text-play', 'text-play-inert');
        }
    }

    if (sentSide === 'front & back'
        && document.querySelector('.audio-row .audio-item[data-audio="sentence"]')
        && frontSent.innerHTML) {
        if (sentAudioSide === 'front & back') {
            window.__linkTextPlay(frontSent, 'sentence', {
                play: function() {
                    var item = document.querySelector('.audio-item[data-audio="sentence"][data-side="front"]');
                    window.__playItemAudios(item);
                },
                getBtn: function() {
                    return document.querySelector('.audio-item[data-audio="sentence"] .replay-button');
                },
                getAllBtns: function() {
                    return Array.from(document.querySelectorAll('.audio-item[data-audio="sentence"] .replay-button'));
                }
            });
        } else if (sentAudioSide !== 'off') {
            frontSent.classList.add('text-play', 'text-play-inert');
        }
    }

    // Fallback: hide buttons that have active text-play coverage
    if (_wab === 'fallback' && wordAI) {
        if (document.querySelector('.text-play:not(.text-play-inert)[data-text-play="word"]')) {
            wordAI.setAttribute('data-btn-off', '');
        }
    }
    if (_sab === 'fallback' && sentAI) {
        if (document.querySelector('.text-play:not(.text-play-inert)[data-text-play="sentence"]')) {
            sentAI.setAttribute('data-btn-off', '');
        }
    }

    // Only clear last margins when front has visible content — in the
    // audio-only case the audio-row's margin-bottom provides symmetric
    // spacing and must be preserved. Tategaki audio-only is an exception:
    // audio-row has margin-left that needs clearing when it's alone.
    var hasFrontContent = !!document.querySelector('.front-content [data-side="front"]');
    var isTategaki = document.documentElement.classList.contains('tategaki');
    if (hasFrontContent || isTategaki) clearLastMargin(document.querySelector('.front'));
    // Only clear inside .front-content when it is itself the last visible
    // child of .front (no audio row below it); otherwise the sentence
    // needs its margin to separate from the audio row.
    var fc = document.querySelector('.front-content');
    if (hasFrontContent && fc && fc.classList.contains('debug-last')) {
        fc.classList.remove('debug-last');
        fc.style.marginBottom = '';
        clearLastMargin(fc);
    }




})();
</script>

<script>
// Replace native <audio> players or [audio:] tags with styled replay buttons
(function() {
  var SVG = window.__audioSVG;
  var animateBtn = window.__animateBtn;
  document.querySelectorAll('.audio-row .audio-item').forEach(function(item) {
    // [audio:] custom tags — extract filename, create Audio + button
    var text = item.textContent;
    var audioRe = /\[audio:([^\]]+)\]/g;
    var audioMatch = audioRe.exec(text);
    if (audioMatch) {
      var filenames = [];
      do { filenames.push(audioMatch[1].replace(/#/g, '%23').replace(/\?/g, '%3F')); }
      while ((audioMatch = audioRe.exec(text)) !== null);
      // Remove everything except .audio-label (text nodes, <br>, stray HTML)
      Array.from(item.childNodes).forEach(function(n) {
        if (n.nodeType === 3 || !n.classList || !n.classList.contains('audio-label'))
          item.removeChild(n);
      });
      item._jsAudios = [];
      for (var k = 0; k < filenames.length; k++) {
        var audio = document.createElement('audio');
        audio.preload = 'auto';
        audio.src = filenames[k];
        document.body.appendChild(audio);
        item._jsAudios.push(audio);
        var btn = document.createElement('a');
        btn.className = 'replay-button soundLink';
        btn.href = '#';
        btn.innerHTML = SVG;
        item.appendChild(btn);
        (function(a, b) {
          window.__onTap(b, function() {
            if (window.matchMedia('(hover: none)').matches) {
              window.__stopAllAudio();
              animateBtn(b);
              window.__playMobile(a.src, b);
            } else {
              window.__stopAllAudio(a);
              a.currentTime = 0;
              window.__safePlay(a);
              animateBtn(b);
              window.__startPlaying(a, b);
            }
          }, function() { window.__stopAllAudio(); });
        })(audio, btn);
      }
      return;
    }
    // [sound:] native
    if (item.querySelector('.replay-button')) return;
    var nativeAudio = item.querySelector('audio');
    if (!nativeAudio) return;
    // Remove non-audio junk (text nodes, <br>, stray HTML)
    Array.from(item.childNodes).forEach(function(n) {
      if (n.nodeType === 3 || (n.nodeType === 1 && n.tagName !== 'AUDIO'
          && (!n.classList || !n.classList.contains('audio-label'))))
        item.removeChild(n);
    });
    nativeAudio.style.display = 'none';
    nativeAudio.removeAttribute('controls');
    var btn = document.createElement('a');
    btn.className = 'replay-button soundLink';
    btn.href = '#';
    btn.innerHTML = SVG;
    item.appendChild(btn);
    window.__onTap(btn, function() {
      if (window.matchMedia('(hover: none)').matches) {
        window.__stopAllAudio();
        animateBtn(btn);
        window.__playMobile(nativeAudio.src, btn);
      } else {
        window.__stopAllAudio(nativeAudio);
        nativeAudio.currentTime = 0;
        window.__safePlay(nativeAudio);
        animateBtn(btn);
        window.__startPlaying(nativeAudio, btn);
      }
    }, function() { window.__stopAllAudio(); });
  });

  // Link button→text hover for front-side text-play
  if (window.__linkBtnHoverToText) {
    document.querySelectorAll('.audio-row .audio-item').forEach(function(item) {
      var audioType = item.getAttribute('data-audio');
      if (!audioType) return;
      item.querySelectorAll('.replay-button').forEach(function(btn) {
        window.__linkBtnHoverToText(btn, audioType);
      });
    });
  }
})();
</script>

<script>
(function() {
  var HANDLER_KEY = '__audioHandler';
  var animateBtn = window.__animateBtn;
  var _lastKey = null, _lastKeyTime = 0, _DBL_MS = 350;
  var _rs = getComputedStyle(document.documentElement);
  var K_WORD = (_rs.getPropertyValue('--hotkey-word-audio').trim() || 'n').toLowerCase();
  var K_SENT = (_rs.getPropertyValue('--hotkey-sentence-audio').trim() || 'h').toLowerCase();
  var K_ALL  = (_rs.getPropertyValue('--hotkey-play-all').trim() || 'z').toLowerCase();
  var K_STOP = _rs.getPropertyValue('--hotkey-stop-all').trim() || '?';
  function isDbl(key) {
    var now = Date.now();
    if (_lastKey === key && now - _lastKeyTime < _DBL_MS) { _lastKey = null; _lastKeyTime = 0; return true; }
    _lastKey = key; _lastKeyTime = now; return false;
  }
  function play(item) {
    if (!item) return;
    window.__playItemAudios(item);
  }
  function playAll() {
    var isBack = !!document.querySelector('.back');
    var items = document.querySelectorAll('.audio-row .audio-item' + (isBack ? '' : '[data-side="front"]'));
    var queue = [];
    items.forEach(function(item) {
      if (item._jsAudios) {
        var btns = item.querySelectorAll('.replay-button');
        for (var j = 0; j < item._jsAudios.length; j++)
          queue.push({ audio: item._jsAudios[j], btn: btns[j], js: true });
      } else {
        var els = item.querySelectorAll('audio');
        var btns = item.querySelectorAll('.replay-button');
        for (var j = 0; j < els.length; j++)
          queue.push({ audio: els[j], btn: btns[j], js: false });
      }
    });
    if (!queue.length) return false;
    window.__stopAllAudio();
    var k = 0;
    function next() {
      if (k >= queue.length) return;
      var entry = queue[k++];
      entry.audio.currentTime = 0;
      window.__safePlay(entry.audio);
      if (entry.btn) animateBtn(entry.btn);
      if (entry.js) window.__startPlaying(entry.audio, entry.btn);
      entry.audio.onended = entry.audio.onerror = next;
    }
    next();
    return true;
  }
  function handler(ev) {
    var el = ev.target;
    if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable)) return;
    var isBack = !!document.querySelector('.back');
    var sf = isBack ? '' : '[data-side="front"]';
    var wordItem = document.querySelector('.audio-row .audio-item[data-audio="word"]' + sf);
    var sentItem = document.querySelector('.audio-row .audio-item[data-audio="sentence"]' + sf);
    var k = ev.key.toLowerCase();
    if (k === K_WORD) { ev.preventDefault(); ev.stopPropagation(); if (isDbl(K_WORD)) window.__stopAllAudio(); else play(wordItem); }
    else if (k === K_SENT) { ev.preventDefault(); ev.stopPropagation(); if (isDbl(K_SENT)) window.__stopAllAudio(); else play(sentItem); }
    else if (k === K_ALL) { if (playAll()) { ev.preventDefault(); ev.stopPropagation(); } }
    else if (k === K_STOP) { ev.preventDefault(); ev.stopPropagation(); if (window.__stopAllAudio) window.__stopAllAudio(); }
  }
  if (window[HANDLER_KEY]) {
    window.removeEventListener('keydown', window[HANDLER_KEY], true);
  }
  window[HANDLER_KEY] = handler;
  window.addEventListener('keydown', handler, { capture: true });

  // Stop all audio when a native [sound:] replay button is tapped on mobile
  var audioRow = document.querySelector('.audio-row');
  if (audioRow) {
    audioRow.addEventListener('click', function(ev) {
      var btn = ev.target.closest('.replay-button');
      if (btn && !btn._hasHandler) window.__stopAllAudio();
    }, true);
  }
})();
</script>
<script>
// Pinch-to-zoom on .card-inner (mobile only)
(function() {
    if (!window.matchMedia('(hover: none)').matches) return;
    var ci = document.querySelector('.card-inner');
    if (!ci) return;

    var scale = 1, startDist = 0, startScale = 1;
    var originX = '50%', originY = '50%';

    function dist(t) {
        var dx = t[0].clientX - t[1].clientX;
        var dy = t[0].clientY - t[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }

    ci.addEventListener('touchstart', function(e) {
        if (e.touches.length === 2) {
            startDist = dist(e.touches);
            startScale = scale;
            var rect = ci.getBoundingClientRect();
            var mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            var my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            originX = ((mx - rect.left) / scale) + 'px';
            originY = ((my - rect.top) / scale) + 'px';
            ci.style.transformOrigin = originX + ' ' + originY;
        }
    }, { passive: true });

    ci.addEventListener('touchmove', function(e) {
        if (e.touches.length === 2) {
            var d = dist(e.touches);
            scale = Math.max(1, Math.min(3, startScale * (d / startDist)));
            ci.style.transform = scale === 1 ? '' : 'scale(' + scale + ')';
        }
    }, { passive: true });

    ci.addEventListener('touchend', function() {
        if (scale <= 1.05) {
            scale = 1;
            ci.style.transform = '';
            ci.style.transformOrigin = '';
        }
    }, { passive: true });
})();
</script>
</div>
